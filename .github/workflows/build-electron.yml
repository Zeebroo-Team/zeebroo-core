name: Build Electron App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      draft_release:
        description: 'Create as draft release'
        type: boolean
        default: true

concurrency:
  group: electron-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────
  #  Build — one job per platform, runs in parallel
  # ──────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Intel + Apple Silicon)
            runner: macos-latest
            platform_flag: --mac
            artifact_name: zeebroo-pos-mac

          - name: Windows (x64)
            runner: windows-latest
            platform_flag: --win
            artifact_name: zeebroo-pos-win

          - name: Linux (x64)
            runner: ubuntu-latest
            platform_flag: --linux
            artifact_name: zeebroo-pos-linux

    defaults:
      run:
        working-directory: electron_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: electron_app/package-lock.json

      # Linux: install native deps electron-builder needs for .deb / AppImage
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install Node dependencies
        run: npm ci

      # ── macOS build (universal binary, optional code signing) ──
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run build -- ${{ matrix.platform_flag }}
        env:
          # Code-signing — leave secrets empty to produce unsigned builds
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # Notarisation — leave secrets empty to skip
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Disable auto-discovery so unsigned builds don't fail
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CERTIFICATE != '' }}

      # ── Windows build (optional code signing) ──
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build -- ${{ matrix.platform_flag }}
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

      # ── Linux build (no signing required) ──
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npm run build -- ${{ matrix.platform_flag }}

      # ── Collect distributable artefacts ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          retention-days: 30
          if-no-files-found: error
          path: |
            electron_app/dist/*.dmg
            electron_app/dist/*.exe
            electron_app/dist/*.msi
            electron_app/dist/*.AppImage
            electron_app/dist/*.deb
            electron_app/dist/*.rpm
            electron_app/dist/latest*.yml
            electron_app/dist/latest*.yaml

  # ──────────────────────────────────────────────────────────
  #  Release — runs after all three builds succeed
  #  Only triggers on a version tag push (v*.*.*)
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zeebroo POS ${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft_release == 'true' || false }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/*.msi
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/latest*.yml
            release-assets/latest*.yaml
