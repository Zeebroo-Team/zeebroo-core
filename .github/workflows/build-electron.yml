name: Build Electron App

on:
  # Fires when you push a vX.Y.Z tag — the release job creates the GitHub Release automatically
  push:
    tags:
      - 'v*.*.*'
  # Manual run from the Actions tab (e.g. for testing the pipeline)
  workflow_dispatch:
    inputs:
      draft_release:
        description: 'Create as draft release'
        type: boolean
        default: true

concurrency:
  group: electron-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# ── Production API URL — injected into every build automatically ───────────
env:
  API_BASE_URL: https://platform.zeebroo.com/api/v1/pos

jobs:
  # ──────────────────────────────────────────────────────────
  #  Build — three platforms in parallel
  # ──────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Intel + Apple Silicon)
            runner: macos-latest
            platform_flag: --mac
            artifact_name: zeebroo-pos-mac

          - name: Windows (x64)
            runner: windows-latest
            platform_flag: --win
            artifact_name: zeebroo-pos-win

          - name: Linux (x64)
            runner: ubuntu-latest
            platform_flag: --linux
            artifact_name: zeebroo-pos-linux

    defaults:
      run:
        working-directory: electron_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: electron_app/package-lock.json

      # Linux: native libs electron-builder needs for AppImage / .deb
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install Node dependencies
        run: npm ci

      # ── macOS: import certificate into keychain only when secret exists ──
      - name: Import macOS certificate
        if: runner.os == 'macOS' && env.MAC_CERTIFICATE != ''
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MAC_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain \
            -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          rm /tmp/certificate.p12

      # ── macOS build (prebuild script auto-sets API_BASE_URL) ──
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run build -- ${{ matrix.platform_flag }}
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Windows: import certificate only when secret exists ──
      - name: Import Windows certificate
        if: runner.os == 'Windows' && env.WIN_CERTIFICATE != ''
        env:
          WIN_CERTIFICATE: ${{ secrets.WIN_CERTIFICATE }}
          WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WIN_CERTIFICATE)
          [IO.File]::WriteAllBytes("$env:TEMP\certificate.p12", $bytes)
          echo "WIN_CSC_LINK=$env:TEMP\certificate.p12" >> $env:GITHUB_ENV
          echo "WIN_CSC_KEY_PASSWORD=$env:WIN_CERTIFICATE_PASSWORD" >> $env:GITHUB_ENV

      # ── Windows build ──
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run build -- ${{ matrix.platform_flag }}
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}

      # ── Linux build ──
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: npm run build -- ${{ matrix.platform_flag }}
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}

      # ── Collect distributable artefacts ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          retention-days: 30
          if-no-files-found: error
          path: |
            electron_app/dist/*.zip
            electron_app/dist/*.exe
            electron_app/dist/*.msi
            electron_app/dist/*.AppImage
            electron_app/dist/*.deb
            electron_app/dist/*.rpm
            electron_app/dist/latest*.yml
            electron_app/dist/latest*.yaml

  # ──────────────────────────────────────────────────────────
  #  Release — runs after all three builds succeed
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zeebroo POS ${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft_release == 'true' || false }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.msi
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/latest*.yml
            release-assets/latest*.yaml

      # ── Notify zeebroo.com website about the new release ──
      - name: Publish release to zeebroo.com
        if: env.ZEEBROO_API_KEY != ''
        env:
          ZEEBROO_API_KEY: ${{ secrets.ZEEBROO_API_KEY }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # stable vs beta/alpha/rc
          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi

          # Filenames match electron-builder artifactName patterns in electron_app/package.json
          WIN_URL="${BASE_URL}/Zeebroo%20POS-Setup-${VERSION}-x64.exe"
          MAC_URL="${BASE_URL}/Zeebroo%20POS-${VERSION}-arm64.zip"
          LINUX_URL="${BASE_URL}/Zeebroo%20POS-${VERSION}-x64.AppImage"

          curl -fsSL -X POST https://zeebroo.com/api/releases \
            -H "X-Api-Key: ${ZEEBROO_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg version   "$VERSION" \
              --arg date      "$RELEASE_DATE" \
              --arg channel   "$CHANNEL" \
              --arg win_url   "$WIN_URL" \
              --arg mac_url   "$MAC_URL" \
              --arg linux_url "$LINUX_URL" \
              '{
                version:      $version,
                release_date: $date,
                channel:      $channel,
                notes:        ["See release notes on GitHub for full changelog"],
                windows_url:  $win_url,
                macos_url:    $mac_url,
                linux_url:    $linux_url
              }')"
