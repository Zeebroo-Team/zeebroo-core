  <circle cx="222" cy="238" r="6" fill="#22c55e"/>
  <line x1="228" y1="238" x2="248" y2="238" stroke="#16a34a" stroke-width="2"/>
  <!-- price tag floating -->
  <rect x="224" y="290" width="100" height="36" rx="10" fill="#22c55e"/>
  <text x="274" y="314" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">CATALOG</text>
</svg>
