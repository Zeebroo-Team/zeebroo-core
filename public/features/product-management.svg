<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 344 347" width="344" height="347">
  <rect width="344" height="347" rx="48" fill="#f0fdf4"/>
  <!-- shelf back -->
  <rect x="44" y="80" width="256" height="16" rx="8" fill="#86efac"/>
  <rect x="44" y="168" width="256" height="16" rx="8" fill="#86efac"/>
  <rect x="44" y="256" width="256" height="16" rx="8" fill="#86efac"/>
  <!-- left upright -->
  <rect x="44" y="72" width="16" height="208" rx="8" fill="#4ade80"/>
  <!-- right upright -->
  <rect x="284" y="72" width="16" height="208" rx="8" fill="#4ade80"/>
  <!-- box 1 (top shelf) -->
  <rect x="88" y="48" width="64" height="32" rx="6" fill="#22c55e"/>
  <rect x="88" y="48" width="64" height="32" rx="6" fill="none" stroke="#16a34a" stroke-width="2"/>
  <line x1="120" y1="48" x2="120" y2="80" stroke="#16a34a" stroke-width="2"/>
  <!-- box 2 (top shelf) -->
  <rect x="168" y="48" width="88" height="32" rx="6" fill="#4ade80"/>
  <rect x="168" y="48" width="88" height="32" rx="6" fill="none" stroke="#16a34a" stroke-width="2"/>
  <!-- box 3 (mid shelf) -->
  <rect x="72" y="136" width="76" height="32" rx="6" fill="#16a34a"/>
  <rect x="72" y="136" width="76" height="32" rx="6" fill="none" stroke="#15803d" stroke-width="2"/>
  <line x1="110" y1="136" x2="110" y2="168" stroke="#15803d" stroke-width="2"/>
  <!-- box 4 (mid shelf) -->
  <rect x="164" y="130" width="56" height="38" rx="6" fill="#22c55e"/>
  <!-- box 5 (bottom shelf) -->
  <rect x="80" y="224" width="96" height="32" rx="6" fill="#4ade80"/>
  <rect x="80" y="224" width="96" height="32" rx="6" fill="none" stroke="#16a34a" stroke-width="2"/>
  <!-- barcode lines on box 5 -->
  <line x1="104" y1="232" x2="104" y2="248" stroke="#15803d" stroke-width="2"/>
  <line x1="110" y1="232" x2="110" y2="248" stroke="#15803d" stroke-width="3"/>
  <line x1="117" y1="232" x2="117" y2="248" stroke="#15803d" stroke-width="2"/>
  <line x1="122" y1="232" x2="122" y2="248" stroke="#15803d" stroke-width="4"/>
  <line x1="128" y1="232" x2="128" y2="248" stroke="#15803d" stroke-width="2"/>
  <line x1="134" y1="232" x2="134" y2="248" stroke="#15803d" stroke-width="3"/>
  <line x1="140" y1="232" x2="140" y2="248" stroke="#15803d" stroke-width="2"/>
  <!-- box 6 (bottom shelf) -->
  <rect x="192" y="220" width="72" height="36" rx="6" fill="#86efac"/>
