        - { name: rule,    in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                sort_order:  { type: integer }
                is_taxable:  { type: boolean }
                is_statutory: { type: boolean }
                is_active:   { type: boolean }
                config_json: { type: string }
      responses:
        '200':
          description: Updated
    delete:
      tags: [HR payroll rule sets]
      summary: Delete a payroll rule
      parameters:
        - { name: ruleSet, in: path, required: true, schema: { type: integer } }
        - { name: rule,    in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted

  /hr/payroll/templates:
    get:
      tags: [HR payroll rule sets]
      summary: List regional payroll templates
      responses:
        '200':
          description: Template list

  /hr/payroll/templates/{key}/install:
    post:
      tags: [HR payroll rule sets]
      summary: Install a regional payroll template
      parameters:
        - { name: key, in: path, required: true, schema: { type: string } }
      responses:
        '201':
          description: Template installed

  # ─────────────────────────── HR PAYROLL CYCLES ───────────────────────────

  /hr/payroll/cycles:
    get:
      tags: [HR payroll cycles]
      summary: List payroll cycles
      responses:
        '200':
          description: Cycle list
    post:
      tags: [HR payroll cycles]
      summary: Create a payroll cycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rule_set_id, name, year, month, period_start, period_end]
              properties:
                rule_set_id:  { type: integer }
                name:         { type: string }
                year:         { type: integer }
                month:        { type: integer, minimum: 1, maximum: 12 }
                period_start: { type: string, format: date }
                period_end:   { type: string, format: date }
      responses:
        '201':
          description: Cycle created

  /hr/payroll/cycles/{cycle}:
    get:
      tags: [HR payroll cycles]
      summary: Get cycle detail with items and summary
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Cycle detail
    delete:
      tags: [HR payroll cycles]
      summary: Delete a payroll cycle
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted

  /hr/payroll/cycles/{cycle}/compute:
    post:
      tags: [HR payroll cycles]
      summary: Compute payroll for all employees in cycle
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Payroll computed

  /hr/payroll/cycles/{cycle}/finalize:
    post:
      tags: [HR payroll cycles]
      summary: Finalize a payroll cycle
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Cycle finalized

  /hr/payroll/cycles/{cycle}/payment:
    post:
      tags: [HR payroll cycles]
      summary: Record payroll payment (deduct from account)
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deduct_account_id]
              properties:
                deduct_account_id: { type: integer }
      responses:
        '200':
          description: Payment recorded

  /hr/payroll/cycles/{cycle}/salary-sheet:
    get:
      tags: [HR payroll cycles]
      summary: Get formatted salary sheet for a cycle
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Salary sheet

  /hr/payroll/cycles/{cycle}/items/{item}/recompute:
    post:
      tags: [HR payroll cycles]
      summary: Recompute a single employee payroll item
      parameters:
        - { name: cycle, in: path, required: true, schema: { type: integer } }
        - { name: item,  in: path, required: true, schema: { type: integer } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                overtime_hours:         { type: number }
                overtime_rate:          { $ref: '#/components/schemas/MoneyAmount' }
                attendance_days:        { type: integer }
                working_days:           { type: integer }
                leave_without_pay_days: { type: integer }
                salary_advance:         { $ref: '#/components/schemas/MoneyAmount' }
                stamp_duty:             { $ref: '#/components/schemas/MoneyAmount' }
      responses:
        '200':
          description: Item recomputed

  # ─────────────────────────── DESIGN STUDIO ───────────────────────────

  /design-studio/designs:
    get:
      tags: [Design studio]
      summary: List designs
      parameters:
        - { name: type, in: query, schema: { type: string, example: letterhead } }
      responses:
        '200':
          description: Design list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Design' } }
    post:
      tags: [Design studio]
      summary: Create a design canvas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, width, height]
              properties:
                title:  { type: string }
                type:   { type: string, example: letterhead }
                width:  { type: integer, example: 794 }
                height: { type: integer, example: 1123 }
      responses:
        '201':
          description: Design created

  /design-studio/designs/{design}:
    get:
      tags: [Design studio]
      summary: Get design with canvas JSON
      parameters:
        - { name: design, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Design detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Design'
                      - type: object
                        properties:
                          canvas_json: { type: object, nullable: true }
    patch:
      tags: [Design studio]
      summary: Update a design (save canvas)
      parameters:
        - { name: design, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:       { type: string }
                canvas_json: { type: object }
      responses:
        '200':
          description: Design saved
    delete:
      tags: [Design studio]
      summary: Delete a design
      parameters:
        - { name: design, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted

  # ─────────────────────────── STOCK AUDITS ───────────────────────────

  /stock-audits:
    get:
      tags: [Stock audits]
      summary: List stock audits
      responses:
        '200':
          description: Stock audit list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { type: object } }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Stock audits]
      summary: Create a stock audit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audit_date]
              properties:
                audit_date: { type: string, format: date }
                notes:      { type: string }
      responses:
        '201':
          description: Audit created

  /stock-audits/{stockAudit}:
    get:
      tags: [Stock audits]
      summary: Get stock audit detail
      parameters:
        - { name: stockAudit, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Audit detail
    delete:
      tags: [Stock audits]
      summary: Delete a stock audit
      parameters:
        - { name: stockAudit, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted

  /stock-audits/{stockAudit}/lines:
    put:
      tags: [Stock audits]
      summary: Save counted quantities on audit lines
      parameters:
        - { name: stockAudit, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lines]
              properties:
                lines:
                  type: array
                  items:
                    type: object
                    properties:
                      counted_qty: { type: number }
                      notes:       { type: string }
      responses:
        '200':
          description: Lines saved

  /stock-audits/{stockAudit}/finalize:
    post:
      tags: [Stock audits]
      summary: Finalize audit and apply stock adjustments
      parameters:
        - { name: stockAudit, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Audit finalized

  # ─────────────────────────── FILE MANAGER ───────────────────────────

  /online/file-manager:
    get:
      tags: [File manager]
      summary: Browse files and folders
      parameters:
        - { name: folder,      in: query, schema: { type: integer }, description: Parent folder ID }
        - { name: images_only, in: query, schema: { type: boolean } }
      responses:
        '200':
          description: File browser response
          content:
            application/json:
              schema:
                type: object
                properties:
                  folders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:   { type: integer }
                        name: { type: string }
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:       { type: integer }
                        name:     { type: string }
                        url:      { type: string }
                        mime:     { type: string }
                        size:     { type: integer }
                        is_image: { type: boolean }
                  breadcrumbs: { type: array, items: { type: object } }

  /online/file-manager/upload:
    post:
      tags: [File manager]
      summary: Upload files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                folder_id: { type: integer }
      responses:
        '201':
          description: Files uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:       { type: integer }
                        name:     { type: string }
                        url:      { type: string }
                        mime:     { type: string }
                        is_image: { type: boolean }

  # ─────────────────────────── SETTINGS ───────────────────────────

  /online/settings:
    get:
      tags: [Settings]
      summary: Get POS settings
      parameters:
        - { name: include, in: query, schema: { type: string, enum: [assignment_targets] } }
      responses:
        '200':
          description: POS settings
    put:
      tags: [Settings]
      summary: Update POS settings (full replace)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_deposit_account_id:  { type: integer, nullable: true }
                discount_field_enabled:      { type: boolean }
                checkout_modal_enabled:      { type: boolean }
                display_theme:               { type: string, enum: [light, dark, inherit] }
                receipt_header:              { type: string }
                receipt_footer:              { type: string }
                show_business_name:          { type: boolean }
                show_business_address:       { type: boolean }
                show_account_info:           { type: boolean }
                payment_settlement_mode:     { type: string, enum: [immediate, end_of_day] }
                featured_products_limit:     { type: integer }
                featured_categories_limit:   { type: integer }
                show_service_bound_products: { type: boolean }
      responses:
        '200':
          description: Settings updated
    patch:
      tags: [Settings]
      summary: Partial update POS settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                default_deposit_account_id: { type: integer, nullable: true }
                discount_field_enabled:     { type: boolean }
                checkout_modal_enabled:     { type: boolean }
                display_theme:              { type: string, enum: [light, dark, inherit] }
                receipt_header:             { type: string }
                receipt_footer:             { type: string }
                payment_settlement_mode:    { type: string, enum: [immediate, end_of_day] }
      responses:
        '200':
          description: Settings updated
