openapi: 3.0.3
info:
  title: Zeebroo POS API
  version: 2.0.0
  description: |
    Full REST API for the Zeebroo POS platform — catalog, checkout, sales, invoicing,
    quotations, purchasing, expenses, payroll, design studio, and more.

    ## Authentication
    1. `POST /auth/token` with `email` + `password` → receive `access_token`
    2. Send `Authorization: Bearer {access_token}` on every protected route.

    ## Business scope
    Most endpoints are scoped to a business. Send **one** of:
    - Header `X-Business-Id: {id}` *(recommended)*
    - Query param `?business_id={id}`

    If omitted the API falls back to the authenticated user's most-recently-selected business.

    ## Branch scope
    When branch-level POS separation is enabled, additionally send `X-Branch-Id: {id}`.

    ## Response envelope
    Successful responses follow `{ "data": … }`.  Lists add `{ "data": […], "meta": { pagination } }`.
    Errors return `{ "message": "…", "errors": { "field": ["…"] } }` with an appropriate HTTP status.

servers:
  - url: /api/v1/pos
    description: POS API (prepend your app URL, e.g. https://platform.zeebroo.com)

tags:
  - name: Auth
    description: Token issuance, user registration, profile, and revocation.
  - name: Businesses
    description: Create and list businesses owned by or accessible to the current user.
  - name: Online bootstrap
    description: Single call to load everything the POS screen needs on startup.
  - name: Catalog
    description: Read-only product and category listings optimised for POS.
  - name: Checkout
    description: Create a completed sale from a cart.
  - name: Products
    description: Full product CRUD (create, update, delete).
  - name: Categories
    description: Product category management.
  - name: Units
    description: Product unit of measure management.
  - name: Brands
    description: Product brand management.
  - name: Discounts
    description: Time-bounded product discounts.
  - name: Sales
    description: Sale history, detail, void.
  - name: Sale returns
    description: Process refunds against a completed sale.
  - name: Quotations
    description: Full quotation lifecycle — draft, sent, accepted, rejected.
  - name: Invoices
    description: Full invoice lifecycle — draft, sent, paid, overdue, cancelled.
  - name: Customers
    description: Customer CRUD and recent purchase history.
  - name: Suppliers
    description: Supplier CRUD.
  - name: Purchase orders
    description: Create and manage supplier purchase orders.
  - name: GRNs
    description: Goods Receive Notes — receive stock against a purchase order.
  - name: Cheques
    description: Track and clear cheque payments attached to GRNs.
  - name: Expense bills
    description: Recurring and one-time expense bill management.
  - name: Expense modifications
    description: Renovation and property modification expense tracking.
  - name: End of day
    description: View unsettled sales and perform end-of-day settlement.
  - name: Finance flow
    description: Combined monthly outflow overview across bills, loans, and rentals.
  - name: Loans
    description: Business loan tracking and installment recording.
  - name: Properties
    description: Business property asset management.
  - name: Rentals
    description: Rental agreement and payment management.
  - name: Accounts & banks
    description: Bank accounts and global bank/type lookups.
  - name: HR employees
    description: Employee records management.
  - name: HR departments
    description: Department management.
  - name: HR job titles
    description: Job title lookup.
  - name: HR allowance types
    description: Payroll allowance type management.
  - name: HR payroll rule sets
    description: Configure payroll calculation rule sets and individual rules.
  - name: HR payroll cycles
    description: Run, compute, finalize, and pay payroll cycles.
  - name: Design studio
    description: Canvas-based design management (letterheads, company profiles, etc.).
  - name: Stock audits
    description: Stock count audits and adjustment finalization.
  - name: File manager
    description: Browse and upload files/images.
  - name: Settings
    description: POS configuration settings.
  - name: Return reasons
    description: Return reason options lookup.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    Meta:
      type: object
      properties:
        current_page: { type: integer, example: 1 }
        last_page:    { type: integer, example: 5 }
        per_page:     { type: integer, example: 50 }
        total:        { type: integer, example: 243 }

    Error:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    MoneyAmount:
      type: number
      format: float
      example: 1250.00

    ItemLine:
      type: object
      required: [quantity, unit_price]
      properties:
        item_type:       { type: string, enum: [product, service, custom], default: product }
        product_id:      { type: integer, nullable: true }
        service_item_id: { type: integer, nullable: true }
        description:     { type: string, nullable: true }
        quantity:        { type: number, format: float, example: 2 }
        unit_price:      { $ref: '#/components/schemas/MoneyAmount' }

    ItemLineResponse:
      allOf:
        - $ref: '#/components/schemas/ItemLine'
        - type: object
          properties:
            id:           { type: integer }
            total:        { $ref: '#/components/schemas/MoneyAmount' }
            product_name: { type: string, nullable: true }

    DocumentStatus:
      type: string
      enum: [draft, sent, accepted, rejected, paid, overdue, cancelled]

    User:
      type: object
      properties:
        id:    { type: integer }
        name:  { type: string }
        email: { type: string, format: email }

    Business:
      type: object
      properties:
        id:   { type: integer }
        name: { type: string }

    ProductCard:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        sku:         { type: string }
        unit_price:  { $ref: '#/components/schemas/MoneyAmount' }
        total_stock: { type: number }
        is_active:   { type: boolean }
        category:    { type: string, nullable: true }
        brand:       { type: string, nullable: true }
        images:      { type: array, items: { type: string } }
        unit_name:   { type: string, nullable: true }

    Customer:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        phone:       { type: string, nullable: true }
        email:       { type: string, nullable: true }
        address:     { type: string, nullable: true }
        notes:       { type: string, nullable: true }
        sales_count: { type: integer }

    Supplier:
      type: object
      properties:
        id:              { type: integer }
        name:            { type: string }
        contact_name:    { type: string, nullable: true }
        email:           { type: string, nullable: true }
        phone:           { type: string, nullable: true }
        address:         { type: string, nullable: true }
        notes:           { type: string, nullable: true }
        is_active:       { type: boolean }
        purchases_count: { type: integer }

    QuotationListItem:
      type: object
      properties:
        id:            { type: integer }
        quote_number:  { type: string, example: QT-0001 }
        status:        { $ref: '#/components/schemas/DocumentStatus' }
        status_label:  { type: string }
        status_color:  { type: string }
        customer_name: { type: string, nullable: true }
        reference:     { type: string, nullable: true }
        quote_date:    { type: string, format: date }
        expiry_date:   { type: string, format: date, nullable: true }
        total:         { $ref: '#/components/schemas/MoneyAmount' }

    InvoiceListItem:
      type: object
      properties:
        id:              { type: integer }
        invoice_number:  { type: string, example: INV-0001 }
        status:          { $ref: '#/components/schemas/DocumentStatus' }
        status_label:    { type: string }
        status_color:    { type: string }
        customer_name:   { type: string, nullable: true }
        reference:       { type: string, nullable: true }
        issue_date:      { type: string, format: date }
        due_date:        { type: string, format: date, nullable: true }
        is_overdue:      { type: boolean }
        total:           { $ref: '#/components/schemas/MoneyAmount' }

    SaleListItem:
      type: object
      properties:
        id:             { type: integer }
        sale_number:    { type: string }
        status:         { type: string }
        channel:        { type: string }
        payment_method: { type: string }
        total:          { $ref: '#/components/schemas/MoneyAmount' }
        sold_at:        { type: string, format: date-time }

    PurchaseOrderListItem:
      type: object
      properties:
        id:                     { type: integer }
        po_number:              { type: string, example: PO-0001 }
        status:                 { type: string }
        status_label:           { type: string }
        supplier_id:            { type: integer }
        supplier_name:          { type: string }
        purchase_date:          { type: string, format: date }
        expected_delivery_date: { type: string, format: date, nullable: true }
        subtotal:               { $ref: '#/components/schemas/MoneyAmount' }
        total:                  { $ref: '#/components/schemas/MoneyAmount' }
        items_count:            { type: integer }
        notes:                  { type: string, nullable: true }

    GrnListItem:
      type: object
      properties:
        id:                   { type: integer }
        grn_number:           { type: string, example: GRN-0001 }
        purchase_id:          { type: integer }
        po_number:            { type: string }
        supplier_name:        { type: string }
        received_date:        { type: string, format: date }
        total:                { $ref: '#/components/schemas/MoneyAmount' }
        payment_method:       { type: string }
        payment_status:       { type: string }
        payment_status_label: { type: string }
        amount_paid:          { $ref: '#/components/schemas/MoneyAmount' }
        amount_outstanding:   { $ref: '#/components/schemas/MoneyAmount' }

    Account:
      type: object
      properties:
        id:              { type: integer }
        account_name:    { type: string }
        bank_name:       { type: string, nullable: true }
        current_balance: { $ref: '#/components/schemas/MoneyAmount' }

    Design:
      type: object
      properties:
        id:         { type: integer }
        title:      { type: string }
        type:       { type: string, nullable: true, example: letterhead }
        width:      { type: integer }
        height:     { type: integer }
        has_canvas: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

paths:

  # ─────────────────────────── AUTH ───────────────────────────

  /auth/token:
    post:
      tags: [Auth]
      summary: Create access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:       { type: string, format: email }
                password:    { type: string, format: password }
                device_name: { type: string, default: pos-desktop }
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:   { type: string, example: Bearer }
                  access_token: { type: string }
                  user:         { $ref: '#/components/schemas/User' }
        '422': { description: Validation error }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user and create first business
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, business_name, business_category, email, password, password_confirmation]
              properties:
                name:                  { type: string }
                business_name:         { type: string }
                business_category:     { type: string }
                features:              { type: array, items: { type: string } }
                email:                 { type: string, format: email }
                password:              { type: string, format: password, minLength: 8 }
                password_confirmation: { type: string, format: password }
                device_name:           { type: string }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  token_type:   { type: string }
                  access_token: { type: string }
                  user:         { $ref: '#/components/schemas/User' }
        '422': { description: Validation error }

  /auth/business-categories:
    get:
      tags: [Auth]
      summary: List business category options
      security: []
      responses:
        '200':
          description: Category options
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        value: { type: string }
                        label: { type: string }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }

  /auth/revoke:
    post:
      tags: [Auth]
      summary: Revoke current token
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  # ─────────────────────────── BUSINESSES ───────────────────────────

  /businesses:
    get:
      tags: [Businesses]
      summary: List accessible businesses
      responses:
        '200':
          description: Business list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Business' }
    post:
      tags: [Businesses]
      summary: Create a new business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category]
              properties:
                name:     { type: string }
                category: { type: string }
                features: { type: array, items: { type: string } }
      responses:
        '201':
          description: Business created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Business' }

  # ─────────────────────────── ONLINE BOOTSTRAP ───────────────────────────

  /online/bootstrap:
    get:
      tags: [Online bootstrap]
      summary: Full POS bootstrap — settings, categories, products, discounts
      parameters:
        - { name: q,            in: query, schema: { type: string } }
        - { name: category,     in: query, schema: { type: integer } }
        - { name: page,         in: query, schema: { type: integer, default: 1 } }
        - { name: per_page,     in: query, schema: { type: integer, default: 24 } }
        - { name: branch,       in: query, schema: { type: integer } }
        - { name: stock_status, in: query, schema: { type: string, enum: [all, in_stock, low_stock, out_of_stock] } }
        - { name: brand_id,     in: query, schema: { type: integer } }
        - { name: sort,         in: query, schema: { type: string, enum: [name, price_asc, price_desc, newest] } }
      responses:
        '200':
          description: Bootstrap payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      settings:     { type: object }
                      categories:   { type: array, items: { type: object } }
                      products:
                        type: object
                        properties:
                          data: { type: array, items: { $ref: '#/components/schemas/ProductCard' } }
                          meta: { $ref: '#/components/schemas/Meta' }
                      discounts:     { type: array, items: { type: object } }
                      selling_units: { type: array, items: { type: object } }

  /online/branches:
    get:
      tags: [Online bootstrap]
      summary: List branches available for POS
      responses:
        '200':
          description: Branch list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      branch_pos_separate: { type: boolean }
                      branches:
                        type: array
                        items:
                          type: object
                          properties:
                            id:   { type: integer }
                            name: { type: string }

  # ─────────────────────────── CATALOG ───────────────────────────

  /online/categories:
    get:
      tags: [Catalog]
      summary: List POS categories
      parameters:
        - { name: branch, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:            { type: integer }
                        name:          { type: string }
                        parent_id:     { type: integer, nullable: true }
                        product_count: { type: integer }
                        image_url:     { type: string, nullable: true }

  /online/products:
    get:
      tags: [Catalog]
      summary: Paginated product catalog for POS screen
      parameters:
        - { name: q,            in: query, schema: { type: string } }
        - { name: category,     in: query, schema: { type: integer } }
        - { name: page,         in: query, schema: { type: integer, default: 1 } }
        - { name: per_page,     in: query, schema: { type: integer, default: 24 } }
        - { name: branch,       in: query, schema: { type: integer } }
        - { name: stock_status, in: query, schema: { type: string } }
        - { name: brand_id,     in: query, schema: { type: integer } }
        - { name: sort,         in: query, schema: { type: string } }
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/ProductCard' } }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:                  { type: string }
                sku:                   { type: string }
                unit_price:            { $ref: '#/components/schemas/MoneyAmount' }
                stock_quantity:        { type: number }
                product_unit_id:       { type: integer, nullable: true }
                description:           { type: string, nullable: true }
                is_active:             { type: boolean, default: true }
                is_bundle:             { type: boolean, default: false }
                product_category_ids:  { type: array, items: { type: integer } }
                product_brand_ids:     { type: array, items: { type: integer } }
                file_manager_file_ids: { type: array, items: { type: integer } }
                bundle_items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id: { type: integer }
                      quantity:   { type: number }
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:    { $ref: '#/components/schemas/ProductCard' }

  /online/products/{id}:
    get:
      tags: [Catalog]
      summary: Full product detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: branch, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/ProductCard'
                      - type: object
                        properties:
                          cost_price:      { $ref: '#/components/schemas/MoneyAmount' }
                          description:     { type: string, nullable: true }
                          is_bundle:       { type: boolean }
                          category_ids:    { type: array, items: { type: integer } }
                          brand_ids:       { type: array, items: { type: integer } }
                          product_unit_id: { type: integer, nullable: true }
                          selling_units:   { type: array, items: { type: object } }
                          stock_layers:    { type: array, items: { type: object } }
                          bundle_items:    { type: array, items: { type: object } }
        '404': { description: Not found }
    patch:
      tags: [Products]
      summary: Update a product
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:                  { type: string }
                sku:                   { type: string }
                unit_price:            { $ref: '#/components/schemas/MoneyAmount' }
                description:           { type: string }
                is_active:             { type: boolean }
                is_bundle:             { type: boolean }
                product_category_ids:  { type: array, items: { type: integer } }
                product_brand_ids:     { type: array, items: { type: integer } }
                file_manager_file_ids: { type: array, items: { type: integer } }
                bundle_items:          { type: array, items: { type: object } }
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:    { $ref: '#/components/schemas/ProductCard' }
    delete:
      tags: [Products]
      summary: Delete a product
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  /online/products/sku/{sku}:
    get:
      tags: [Catalog]
      summary: Look up product by SKU (barcode scan)
      parameters:
        - { name: sku, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Product card
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProductCard' }
        '404': { description: SKU not found }

  /online/products/{id}/sales-chart:
    get:
      tags: [Catalog]
      summary: Product sales chart data
      parameters:
        - { name: id,     in: path,  required: true, schema: { type: integer } }
        - { name: period, in: query, schema: { type: string, enum: [daily, weekly, monthly], default: monthly } }
      responses:
        '200':
          description: Chart data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      period:   { type: string }
                      subtitle: { type: string }
                      total:    { $ref: '#/components/schemas/MoneyAmount' }
                      labels:   { type: array, items: { type: string } }
                      series:   { type: array, items: { type: number } }

  # ─────────────────────────── CHECKOUT ───────────────────────────

  /online/checkout:
    post:
      tags: [Checkout]
      summary: Create a sale from cart items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, payment_method]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [product_id, quantity]
                    properties:
                      product_id:              { type: integer }
                      quantity:                { type: number }
                      product_stock_layer_id:  { type: integer, nullable: true }
                      product_selling_unit_id: { type: integer, nullable: true }
                payment_method:    { type: string, enum: [cash, card, credit] }
                channel:           { type: string, enum: [retail, online], default: retail }
                credit_account_id: { type: integer, nullable: true }
                amount_paid:       { $ref: '#/components/schemas/MoneyAmount' }
                amount_tendered:   { $ref: '#/components/schemas/MoneyAmount' }
                discount_percent:  { type: number, minimum: 0, maximum: 100 }
                notes:             { type: string, nullable: true }
                branch_id:         { type: integer, nullable: true }
      responses:
        '201':
          description: Sale created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:    { $ref: '#/components/schemas/SaleListItem' }
        '422': { description: Validation / stock error }

  # ─────────────────────────── CATEGORIES ───────────────────────────

  /categories:
    get:
      tags: [Categories]
      summary: List product categories
      parameters:
        - { name: q,      in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [active, inactive] } }
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:             { type: integer }
                        name:           { type: string }
                        description:    { type: string, nullable: true }
                        parent_id:      { type: integer, nullable: true }
                        parent_name:    { type: string, nullable: true }
                        is_active:      { type: boolean }
                        sort_order:     { type: integer }
                        products_count: { type: integer }
                        children_count: { type: integer }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Categories]
      summary: Create a category
      requestBody:
