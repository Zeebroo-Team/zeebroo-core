<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Quotation</title>
<link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
<style>
@page { size: A4; margin: 0; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  font-size: 12px;
  background: #f0f2f5;
  color: #0f172a;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* ── Loading overlay ── */
#pq-loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
  background: #fff; z-index: 999;
  font-size: 14px; font-weight: 600; color: #64748b;
}
.pq-spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid #e2e8f0; border-top-color: #1d4ed8;
  animation: pqSpin .8s linear infinite;
}
@keyframes pqSpin { to { transform: rotate(360deg); } }

/* ── Screen: centred A4 card ── */
.pq-screen-wrap {
  display: flex; justify-content: center; padding: 24px;
  min-height: 100vh; background: #e5e7eb;
}

/* ── A4 page ── */
.pq-page {
  position: relative;
  width: 794px;
  min-height: 1123px;
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,.15);
  flex-shrink: 0;
  overflow: hidden;
}

/* Letterhead image sits behind everything */
.pq-lh-img {
  position: absolute;
  top: 0; left: 0;
  width: 794px; height: 1123px;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

/* Content is positioned on top, padded to respect letterhead header/footer */
.pq-content {
  position: relative;
  z-index: 1;
  padding: var(--ct, 155px) 52px var(--cb, 100px);
  min-height: 1123px;
}

/* ── Quote header ── */
.pq-hdr {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2px solid #1d4ed8;
}
.pq-hdr-num  { font-size: 20px; font-weight: 800; color: #1d4ed8; line-height: 1.1; }
.pq-hdr-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #94a3b8; margin-top: 3px; }

.pq-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 5px;
  text-transform: uppercase; letter-spacing: .05em;
  display: inline-block;
}
.pq-badge-draft     { background: #f1f5f9; color: #475569; }
.pq-badge-sent      { background: #dbeafe; color: #1d4ed8; }
.pq-badge-accepted  { background: #dcfce7; color: #15803d; }
.pq-badge-paid      { background: #dcfce7; color: #15803d; }
.pq-badge-rejected  { background: #fee2e2; color: #b91c1c; }
.pq-badge-overdue   { background: #fee2e2; color: #b91c1c; }
.pq-badge-cancelled { background: #f1f5f9; color: #64748b; }

/* ── Info grid ── */
.pq-info {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; margin-bottom: 20px;
}
.pq-lbl       { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #94a3b8; margin-bottom: 5px; }
.pq-cust-name { font-size: 14px; font-weight: 700; color: #0f172a; }
.pq-cust-ref  { font-size: 11px; color: #64748b; margin-top: 3px; }
.pq-meta-row  { display: flex; justify-content: space-between; font-size: 11px; color: #64748b; padding: 4px 0; border-bottom: 1px dashed #e2e8f0; }
.pq-meta-row:last-child { border-bottom: none; }
.pq-meta-row strong { color: #0f172a; font-weight: 600; }

/* ── Items table ── */
.pq-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
.pq-table thead th {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
  color: #475569; background: #f8fafc;
  padding: 8px 10px; border: 1px solid #e2e8f0; text-align: left;
}
.pq-table thead th.r { text-align: right; }
.pq-table tbody td {
  font-size: 11px; color: #334155;
  padding: 7px 10px; border: 1px solid #e2e8f0;
}
.pq-table tbody tr:nth-child(even) td { background: #f8fafc; }
.pq-table td.n  { color: #94a3b8; text-align: center; width: 32px; }
.pq-table td.r  { text-align: right; }
.pq-table td.bd { font-weight: 600; }

/* ── Totals ── */
.pq-totals-wrap { display: flex; justify-content: flex-end; margin-bottom: 18px; }
.pq-totals { width: 280px; }
.pq-total-row {
  display: flex; justify-content: space-between;
  font-size: 11px; color: #475569;
  padding: 5px 0; border-bottom: 1px solid #f1f5f9;
}
.pq-total-row.grand {
  font-size: 14px; font-weight: 800; color: #0f172a;
  border-top: 2px solid #1d4ed8; border-bottom: none;
  padding-top: 9px; margin-top: 4px;
}
.pq-total-row.grand span:last-child { color: #1d4ed8; }

/* ── Notes ── */
.pq-notes { margin-top: 18px; border-top: 1px solid #e2e8f0; padding-top: 12px; }
.pq-notes-lbl  { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #94a3b8; margin-bottom: 6px; }
.pq-notes-body { font-size: 11px; color: #475569; line-height: 1.65; white-space: pre-wrap; }

/* ── Top bar (screen only) ── */
.pq-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: #fff; border-bottom: 1px solid #e2e8f0;
  position: sticky; top: 0; z-index: 200;
}
.pq-topbar-title { font-size: 14px; font-weight: 700; color: #0f172a; flex: 1; }
.pq-print-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 18px; font-size: 13px; font-weight: 600;
  background: #1d4ed8; color: #fff;
  border: none; border-radius: 8px; cursor: pointer; font-family: inherit;
}
.pq-print-btn:hover { opacity: .88; }
.pq-close-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; font-size: 13px; font-weight: 600;
  background: #f1f5f9; color: #475569;
  border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-family: inherit;
}
.pq-close-btn:hover { background: #e2e8f0; }

@media print {
  #pq-loading, .pq-topbar { display: none !important; }
  body  { background: transparent !important; }
  .pq-screen-wrap { display: block !important; padding: 0 !important; background: transparent !important; min-height: auto !important; }
  .pq-page { box-shadow: none !important; width: 794px; min-height: 1123px; overflow: visible !important; }
}
</style>
</head>
<body>

<div id="pq-loading">
  <div class="pq-spinner"></div>
  Preparing layout…
</div>

<!-- Hidden canvas for Fabric.js letterhead rendering -->
<canvas id="pq-fabric" style="display:none;position:absolute;left:-9999px"></canvas>

<!-- Screen topbar (hidden on print) -->
<div class="pq-topbar" id="pq-topbar" style="display:none">
  <span class="pq-topbar-title" id="pq-topbar-title">Quotation</span>
  <button class="pq-close-btn" onclick="window.close()">Close</button>
  <button class="pq-print-btn" onclick="window.print()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print / Save PDF
  </button>
</div>

<!-- A4 page output -->
<div class="pq-screen-wrap" id="pq-screen-wrap" style="display:none">
  <div class="pq-page" id="pq-page">
    <!-- Letterhead background (injected dynamically) -->
    <div id="pq-lh-wrap" style="display:none">
      <img id="pq-lh-img" class="pq-lh-img" alt="">
    </div>
    <!-- Quotation content -->
    <div class="pq-content" id="pq-content"></div>
  </div>
</div>

<script src="js/fabric.min.js"></script>
<script>
(function() {
  'use strict';

  function escH(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildQuoteHtml(q, cur) {
    var docType   = q.doc_type || 'Quotation';
    var isInvoice = docType === 'Invoice';
    // Support both quotation (quote_date/expiry_date) and invoice (issue_date/due_date) field names
    var dateLabel   = isInvoice ? 'Issue Date' : 'Quote Date';
    var expiryLabel = isInvoice ? 'Due Date'   : 'Valid Until';
    var rawDate   = isInvoice ? (q.issue_date  || q.quote_date)  : q.quote_date;
    var rawExpiry = isInvoice ? (q.due_date    || q.expiry_date) : q.expiry_date;
    var dateStr   = rawDate   ? new Date(rawDate   + 'T00:00:00').toLocaleDateString(undefined, { month:'long', day:'numeric', year:'numeric' }) : '—';
    var expiryStr = rawExpiry ? new Date(rawExpiry + 'T00:00:00').toLocaleDateString(undefined, { month:'long', day:'numeric', year:'numeric' }) : '—';

    var rows = (q.items || []).map(function(item, i) {
      var qty = parseFloat(item.quantity);
      var qtyStr = qty % 1 === 0 ? String(Math.round(qty)) : qty.toFixed(2);
      return '<tr>'
        + '<td class="n">' + (i + 1) + '</td>'
        + '<td>' + escH(item.description || '—') + '</td>'
        + '<td class="r">' + qtyStr + '</td>'
        + '<td class="r">' + parseFloat(item.unit_price).toFixed(2) + cur + '</td>'
        + '<td class="r bd">' + parseFloat(item.line_total).toFixed(2) + cur + '</td>'
        + '</tr>';
    }).join('');

    var statusCls = 'pq-badge-' + (q.status || 'draft');

    var totals = ''
      + '<div class="pq-total-row"><span>Subtotal</span><span>' + parseFloat(q.subtotal || 0).toFixed(2) + cur + '</span></div>';
    if (parseFloat(q.discount_amount) > 0) {
      totals += '<div class="pq-total-row"><span>Discount</span><span>&minus;' + parseFloat(q.discount_amount).toFixed(2) + cur + '</span></div>';
    }
    if (parseFloat(q.tax_amount) > 0) {
      totals += '<div class="pq-total-row"><span>Tax</span><span>+' + parseFloat(q.tax_amount).toFixed(2) + cur + '</span></div>';
    }
    totals += '<div class="pq-total-row grand"><span>Total</span><span>' + parseFloat(q.total || 0).toFixed(2) + cur + '</span></div>';

    return ''
      + '<div class="pq-hdr">'
        + '<div><div class="pq-hdr-num">' + escH(q.quote_number) + '</div><div class="pq-hdr-type">' + escH(docType) + '</div></div>'
        + '<span class="pq-badge ' + statusCls + '">' + escH(q.status_label || q.status || '') + '</span>'
      + '</div>'
      + '<div class="pq-info">'
        + '<div>'
          + '<div class="pq-lbl">Bill To</div>'
          + '<div class="pq-cust-name">' + escH(q.customer_name || 'Walk-in Customer') + '</div>'
          + (q.reference ? '<div class="pq-cust-ref"># ' + escH(q.reference) + '</div>' : '')
        + '</div>'
        + '<div>'
          + '<div class="pq-meta-row"><span>' + dateLabel + '</span><strong>' + dateStr + '</strong></div>'
          + '<div class="pq-meta-row"><span>' + expiryLabel + '</span><strong>' + expiryStr + '</strong></div>'
        + '</div>'
      + '</div>'
      + '<table class="pq-table">'
        + '<thead><tr>'
          + '<th style="width:32px;text-align:center">#</th>'
          + '<th>Description</th>'
          + '<th class="r" style="width:60px">Qty</th>'
          + '<th class="r" style="width:110px">Unit Price</th>'
          + '<th class="r" style="width:110px">Total</th>'
        + '</tr></thead>'
        + '<tbody>' + rows + '</tbody>'
      + '</table>'
      + '<div class="pq-totals-wrap"><div class="pq-totals">' + totals + '</div></div>'
      + (q.notes
          ? '<div class="pq-notes"><div class="pq-notes-lbl">Notes</div><div class="pq-notes-body">' + escH(q.notes) + '</div></div>'
          : '');
  }

  async function renderLetterhead(canvasJson, width, height) {
    return new Promise(function(resolve) {
      var el = document.getElementById('pq-fabric');
      el.width  = width  || 794;
      el.height = height || 1123;
      var c = new fabric.Canvas(el, {
        width:               width  || 794,
        height:              height || 1123,
        enableRetinaScaling: false,
        renderOnAddRemove:   false,
      });
      var parsed;
      try { parsed = typeof canvasJson === 'string' ? JSON.parse(canvasJson) : canvasJson; }
      catch(e) { resolve(null); return; }
      c.loadFromJSON(parsed, function() {
        c.renderAll();
        var dataUrl = c.toDataURL({ format: 'png', multiplier: 1 });
        c.dispose();
        resolve(dataUrl);
      });
    });
  }

  async function render(data) {
    var q   = data.quote;
    var lh  = data.letterhead;
    var cur = data.currency ? ' ' + data.currency : '';

    document.getElementById('pq-topbar-title').textContent = q.quote_number + ' — ' + (q.doc_type || 'Quotation');
    document.getElementById('pq-content').innerHTML = buildQuoteHtml(q, cur);

    if (lh && lh.canvas_json) {
      var imgData = await renderLetterhead(lh.canvas_json, lh.width, lh.height);
      if (imgData) {
        document.getElementById('pq-lh-img').src = imgData;
        document.getElementById('pq-lh-wrap').style.display = '';
        // Adjust content top padding to letterhead header height (heuristic: top 18%)
        var topPad = Math.round((lh.height || 1123) * 0.18);
        var botPad = Math.round((lh.height || 1123) * 0.09);
        document.getElementById('pq-content').style.setProperty('--ct', topPad + 'px');
        document.getElementById('pq-content').style.setProperty('--cb', botPad + 'px');
        // Apply custom properties directly since CSS var() + setProperty works in Chromium
        document.getElementById('pq-content').style.paddingTop    = topPad + 'px';
        document.getElementById('pq-content').style.paddingBottom = botPad + 'px';
      }
    }

    document.getElementById('pq-loading').style.display     = 'none';
    document.getElementById('pq-topbar').style.display      = '';
    document.getElementById('pq-screen-wrap').style.display = '';
  }

  window.addEventListener('DOMContentLoaded', async function() {
    var data = await window.electronAPI.getQuotePrintData();
    if (!data || !data.quote) {
      document.getElementById('pq-loading').textContent = 'No quotation data received.';
      return;
    }
    await render(data);

    // Support re-rendering if the same window is reused for a different quotation
    window.electronAPI.onQuotePrintRefresh(async function(newData) {
      document.getElementById('pq-loading').style.display  = 'flex';
      document.getElementById('pq-topbar').style.display   = 'none';
      document.getElementById('pq-screen-wrap').style.display = 'none';
      document.getElementById('pq-lh-wrap').style.display  = 'none';
      await render(newData);
    });
  });
})();
</script>
</body>
</html>
